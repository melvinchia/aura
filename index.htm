<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA - Age-aware Understanding & Resourceful Assessment</title>
    
    <script>const MAX_SOMETIMES = 10;</script>

    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.8s ease;
            overflow: auto;
            position: relative;
            background: linear-gradient(135deg, #e6f0f7, #d8e4f0);
        }

        /* Age group backgrounds */
        body.age-7-12  { background: linear-gradient(135deg, #a8e6cf, #d4f4dd); }
        body.age-13-20 { background: linear-gradient(135deg, #b4d8f0, #e0f0ff); }
        body.age-21-40 { background: linear-gradient(135deg, #d8b4f0, #f0d4ff); }
        body.age-41    { background: linear-gradient(135deg, #f4c4a8, #ffe4d4); }

        .clouds { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.85);
            border-radius: 50%;
            animation: drift linear infinite;
        }
        @keyframes drift { from { transform: translateX(-300px); } to { transform: translateX(120vw); } }

        .modal {
            background: white;
            max-width: 820px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.18);
            overflow: hidden;
            z-index: 1;
        }

        .modal-content {
            padding: 35px 25px;
            text-align: center;
            max-height: 95vh;
            overflow-y: auto;
        }

        h1 { font-size: 2.1rem; color: #2c5aa0; margin-bottom: 8px; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; color: #444; }
        input[type="text"], select {
            width: 100%; max-width: 420px; padding: 15px 18px; font-size: 1.2rem;
            border: 2px solid #ddd; border-radius: 10px; margin: 8px auto 18px;
        }

        button { 
            padding: 16px 32px; margin: 22px auto; font-size: 1.3rem; border: none; 
            border-radius: 12px; cursor: pointer; min-width: 240px; display: block;
            font-weight: 600; transition: all 0.3s;
        }
        button:disabled { background: #bbb !important; color: #555 !important; cursor: not-allowed; }
        #start-btn { background: #4caf50; color: white; }
        #start-btn:hover:not(:disabled) { background: #43a047; transform: scale(1.03); }

        .options { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 30px 0; }
        .options button { padding: 14px 22px; font-size: 1.1rem; min-width: 105px; border-radius: 10px; }

        .hidden { display: none; }

        /* Responsive fixes */
        @media (max-width: 600px) { /* Portrait mobile */
            .modal-content { padding: 25px 20px; }
            h1 { font-size: 1.75rem; }
            input, select, button { font-size: 1.1rem; padding: 14px 16px; }
        }

        @media (orientation: landscape) and (max-height: 550px) { /* Landscape mobile (iPhone Pro Max etc.) */
            .modal-content { 
                padding: 20px 18px; 
                max-height: 98vh;
            }
            h1 { font-size: 1.65rem; }
            label { font-size: 1rem; margin: 8px 0 4px; }
            input, select { padding: 12px 16px; font-size: 1.05rem; }
            button, .options button { 
                padding: 13px 24px; 
                font-size: 1.05rem; 
                min-width: 100px;
            }
            #start-btn { min-width: 100%; padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="clouds" id="clouds"></div>

    <div class="modal" id="main-modal">
        <div class="modal-content">
            <h1>Welcome to AURA 🌟</h1>
            <p><strong>AURA</strong> — <em>Age-aware Understanding & Resourceful Assessment</em></p>
            <p>A gentle, private, and respectful tool to help you explore possible ADHD or Autism traits.</p>
            <p><strong>This is not a diagnosis.</strong> Professional evaluation is recommended.</p>

            <div id="start-screen">
                <label>What's your name?</label>
                <input id="name" type="text" placeholder="e.g., Alex">

                <label style="margin-top: 20px;">Select your age group</label>
                <select id="ageGroup">
                    <option value="" disabled selected>Select your age group</option>
                    <option value="7-12">7-12 years</option>
                    <option value="13-20">13-20 years</option>
                    <option value="21-40">21-40 years</option>
                    <option value="41+">41 and above</option>
                </select>
                
                <button id="start-btn" onclick="startScreening()" disabled>Start Screening</button>
            </div>

            <!-- Quiz and Results sections remain the same -->
            <div id="quiz-screen" class="hidden">...</div>
            <div id="results-screen" class="hidden">...</div>
        </div>
    </div>

    <script>

        // (I omitted the long script here for brevity - use the full one from before)
        // Make sure you have the complete <script> block
    </script>
</body>
</html>
